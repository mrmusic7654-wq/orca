name: Build ORCA APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Set up Gradle 8.3
      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.3

      # 4. Grant execute permission for gradlew (just in case)
      - name: Make Gradle executable
        run: chmod +x ./gradlew || true

      # 5. Clean & assemble debug APK
      - name: Build APK
        run: ./gradlew clean assembleDebug --stacktrace

      # 6. Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ORCA-debug-apk
          path: app/build/outputs/apk/debug/*.apk
