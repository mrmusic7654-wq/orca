name: Build ORCA APK (No Wrapper)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout
      uses: actions/checkout@v4

    # 2️⃣ Setup Java
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3️⃣ Install Gradle manually
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4️⃣ Build APK using Gradle directly (NO wrapper)
    - name: Build APK
      run: gradle assembleDebug --stacktrace

    # 5️⃣ Upload APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ORCA-APK
        path: app/build/outputs/apk/debug/app-debug.apk
